version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kpss_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kpss_user
      POSTGRES_PASSWORD: kpss_password
      POSTGRES_DB: kpss_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kpss_user -d kpss_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kpss_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kpss_backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://kpss_user:kpss_password@postgres:5432/kpss_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-kpss-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data: